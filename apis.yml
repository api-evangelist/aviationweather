apis:
  - name: Aviation Weather Data API
    description: >-
      Public REST API exposing operational aviation weather products
      produced by the NOAA/NWS Aviation Weather Center. Endpoints cover
      decoded weather observations (METAR), terminal forecasts (TAF),
      pilot reports (PIREP/AIREP), domestic and international SIGMETs,
      G-AIRMETs and AIRMETs, CWAs, TFM convective forecasts, area
      forecasts, forecast discussions, meteorological information
      statements, plus reference data for stations, airports, NAVAIDs,
      fixes, features, and obstacles. All endpoints are public and
      do not require an API key.
    humanURL: https://aviationweather.gov/data/api/
    baseURL: https://aviationweather.gov/api/data
