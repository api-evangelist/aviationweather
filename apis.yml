integrations:
  - name: api.weather.gov
    description: NWS general weather API (separate from AWC aviation surface).
    url: https://api.weather.gov/
  - name: NOAA WIFS
    description: Weather Information For System — bulk GRIB/IWXXM distribution.
    url: https://aviationweather.gov/wifs/
  - name: FAA SWIM
    description: FAA System Wide Information Management — operational distribution channel that also carries AWC products.
    url: https://www.faa.gov/air_traffic/technology/swim
solutions:
  - name: Flight planning
    description: Pre-flight briefings combining METAR, TAF, PIREP, SIGMET, and AIRMET data.
  - name: Dispatch and operations
    description: Airline/charter dispatch consuming SIGMET/AIRMET for route avoidance.
  - name: General aviation apps
    description: EFB (electronic flight bag) apps surfacing aviation weather on mobile.
  - name: Research and analytics
    description: Academic and research use of historical aviation weather observations and advisories.
