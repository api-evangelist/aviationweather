naftiko: "1.0.0-alpha2"

info:
  label: "AviationWeather.gov API — Weather Data"
  description: >-
    Weather Data — the operational aviation weather surface of the NOAA/NWS
    Aviation Weather Center. Lead operation: retrieve current METAR observations
    for one or more ICAO identifiers in raw, JSON, GeoJSON, XML, or IWXXM format.
    This capability also exposes Terminal Aerodrome Forecasts (TAFs), pilot reports
    (PIREPs/AIREPs), domestic SIGMETs, international SIGMETs, AIRMETs, US Graphical
    AIRMETs, TFM convective forecasts, CWSU center advisories, wind/temp point data,
    US area forecasts, area forecast discussions, and meteorological information
    statements. Self-contained Naftiko capability covering one Aviation Weather
    Center business surface.
  tags:
    - Aviation Weather Center
    - NOAA NWS
    - Weather Data
  created: "2026-05-29"
  modified: "2026-05-29"

binds:
  - namespace: env
    keys: {}

capability:

  # ── 1. Consumes — the upstream HTTP API this capability speaks to ─────
  consumes:
    - type: http
      namespace: "aviationweather-weather-data"
      baseUri: "https://aviationweather.gov"
      description: "Aviation Weather Center public Data API — Weather Data surface. Self-contained, no shared references."
      authentication:
        type: none
      resources:
        - name: "metar"
          path: "/api/data/metar"
          operations:
            - name: "getMetar"
              method: GET
              description: "Decoded aviation weather observations (METARs)."
              inputParameters:
                - name: "ids"
                  in: query
                  type: string
                  required: false
                  description: "Station identifiers (single ICAO, comma-list, or @<state>)."
                - name: "bbox"
                  in: query
                  type: string
                  required: false
                  description: "Bounding box: minLat,minLon,maxLat,maxLon."
                - name: "format"
                  in: query
                  type: string
                  required: false
                  description: "Response format (raw, decoded, json, geojson, xml, iwxxm)."
                - name: "taf"
                  in: query
                  type: boolean
                  required: false
                  description: "Include TAF alongside METAR."
                - name: "hours"
                  in: query
                  type: integer
                  required: false
                  description: "Hours back to retrieve."
                - name: "date"
                  in: query
                  type: string
                  required: false
                  description: "ISO 8601 date or Unix epoch."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "taf"
          path: "/api/data/taf"
          operations:
            - name: "getTaf"
              method: GET
              description: "Decoded Terminal Aerodrome Forecasts."
              inputParameters:
                - name: "ids"
                  in: query
                  type: string
                  required: false
                  description: "Station identifiers."
                - name: "bbox"
                  in: query
                  type: string
                  required: false
                  description: "Bounding box."
                - name: "format"
                  in: query
                  type: string
                  required: false
                  description: "Response format."
                - name: "metar"
                  in: query
                  type: boolean
                  required: false
                  description: "Include METAR alongside TAF."
                - name: "time"
                  in: query
                  type: string
                  required: false
                  description: "Process by valid or issue time."
                - name: "date"
                  in: query
                  type: string
                  required: false
                  description: "ISO 8601 date or Unix epoch."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "pirep"
          path: "/api/data/pirep"
          operations:
            - name: "getPirep"
              method: GET
              description: "Pilot reports issued in PIREP or AIREP format."
              inputParameters:
                - name: "id"
                  in: query
                  type: string
                  required: false
                  description: "Airport ID for center of search."
                - name: "distance"
                  in: query
                  type: integer
                  required: false
                  description: "Radial distance to search (nm)."
                - name: "bbox"
                  in: query
                  type: string
                  required: false
                  description: "Bounding box."
                - name: "format"
                  in: query
                  type: string
                  required: false
                  description: "Response format."
                - name: "age"
                  in: query
                  type: integer
                  required: false
                  description: "Hours back."
                - name: "level"
                  in: query
                  type: integer
                  required: false
                  description: "Level +-3000' to search."
                - name: "inten"
                  in: query
                  type: string
                  required: false
                  description: "Minimum intensity (lgt, mod, sev)."
                - name: "date"
                  in: query
                  type: string
                  required: false
                  description: "ISO 8601 date or Unix epoch."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "airsigmet"
          path: "/api/data/airsigmet"
          operations:
            - name: "getAirSigmet"
              method: GET
              description: "Domestic SIGMETs for the contiguous United States."
              inputParameters:
                - name: "format"
                  in: query
                  type: string
                  required: false
                  description: "Response format."
                - name: "hazard"
                  in: query
                  type: string
                  required: false
                  description: "Hazard (conv, turb, ice, ifr)."
                - name: "level"
                  in: query
                  type: integer
                  required: false
                  description: "Level +-3000'."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "isigmet"
          path: "/api/data/isigmet"
          operations:
            - name: "getISigmet"
              method: GET
              description: "Decoded international SIGMETs."
              inputParameters:
                - name: "format"
                  in: query
                  type: string
                  required: false
                  description: "Response format."
                - name: "hazard"
                  in: query
                  type: string
                  required: false
                  description: "Hazard (turb, ice)."
                - name: "level"
                  in: query
                  type: integer
                  required: false
                  description: "Level +-3000'."
                - name: "date"
                  in: query
                  type: string
                  required: false
                  description: "ISO 8601 date or Unix epoch."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "gairmet"
          path: "/api/data/gairmet"
          operations:
            - name: "getGAirmet"
              method: GET
              description: "Decoded G-AIRMETs for the contiguous United States."
              inputParameters:
                - name: "product"
                  in: query
                  type: string
                  required: false
                  description: "Product type (sierra, tango, zulu)."
                - name: "format"
                  in: query
                  type: string
                  required: false
                  description: "Response format."
                - name: "hazard"
                  in: query
                  type: string
                  required: false
                  description: "Hazard type."
                - name: "date"
                  in: query
                  type: string
                  required: false
                  description: "ISO 8601 date or Unix epoch."
                - name: "fore"
                  in: query
                  type: integer
                  required: false
                  description: "Forecast hour (0, 3, 6, 9, 12)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "airmet"
          path: "/api/data/airmet"
          operations:
            - name: "getAirmet"
              method: GET
              description: "AIRMETs (text-format, primarily Alaska)."
              inputParameters:
                - name: "format"
                  in: query
                  type: string
                  required: false
                  description: "Response format."
                - name: "date"
                  in: query
                  type: string
                  required: false
                  description: "ISO 8601 date or Unix epoch."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "tcf"
          path: "/api/data/tcf"
          operations:
            - name: "getTcf"
              method: GET
              description: "TFM Convective Forecast."
              inputParameters:
                - name: "format"
                  in: query
                  type: string
                  required: false
                  description: "Response format."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "cwa"
          path: "/api/data/cwa"
          operations:
            - name: "getCwa"
              method: GET
              description: "CWSU Center Weather Advisories."
              inputParameters:
                - name: "cwsu"
                  in: query
                  type: string
                  required: false
                  description: "CWSU identifier (e.g. ZKC, ZNY)."
                - name: "format"
                  in: query
                  type: string
                  required: false
                  description: "Response format."
                - name: "hazard"
                  in: query
                  type: string
                  required: false
                  description: "Hazard type."
                - name: "date"
                  in: query
                  type: string
                  required: false
                  description: "ISO 8601 date or Unix epoch."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "windtemp"
          path: "/api/data/windtemp"
          operations:
            - name: "getWindTemp"
              method: GET
              description: "Wind and temperature point data forecast."
              inputParameters:
                - name: "region"
                  in: query
                  type: string
                  required: false
                  description: "Region (us, bos, mia, chi, dfw, slc, sfo, alaska, hawaii, other_pac)."
                - name: "level"
                  in: query
                  type: string
                  required: false
                  description: "Altitude band (low, high)."
                - name: "fcst"
                  in: query
                  type: integer
                  required: false
                  description: "Forecast hour."
              outputRawFormat: text
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "areafcst"
          path: "/api/data/areafcst"
          operations:
            - name: "getAreaForecast"
              method: GET
              description: "US Area Forecasts (legacy AFs)."
              inputParameters:
                - name: "region"
                  in: query
                  type: string
                  required: false
                  description: "Area forecast region identifier."
                - name: "date"
                  in: query
                  type: string
                  required: false
                  description: "ISO 8601 date or Unix epoch."
              outputRawFormat: text
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "fcstdisc"
          path: "/api/data/fcstdisc"
          operations:
            - name: "getForecastDiscussion"
              method: GET
              description: "US Forecast Discussions (AFD-style narratives)."
              inputParameters:
                - name: "cwa"
                  in: query
                  type: string
                  required: false
                  description: "WFO CWA identifier (e.g. eax, lwx)."
                - name: "type"
                  in: query
                  type: string
                  required: false
                  description: "Discussion type (afd, etc.)."
              outputRawFormat: text
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "mis"
          path: "/api/data/mis"
          operations:
            - name: "getMis"
              method: GET
              description: "Meteorological Information Statements from CWSUs."
              inputParameters:
                - name: "cwsu"
                  in: query
                  type: string
