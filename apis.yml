aid: aviationweather
name: Aviation Weather Center
description: >-
  The NOAA/NWS Aviation Weather Center (AWC) public data API provides
  machine-to-machine access to operational aviation weather products including
  METARs, TAFs, pilot reports (PIREPs/AIREPs), SIGMETs (domestic and
  international), G-AIRMETs and AIRMETs, Center Weather Advisories (CWAs),
  TFM convective forecasts (TCFs), area forecasts, area forecast discussions,
  meteorological information statements (MIS), and reference data for stations,
  airports, NAVAIDs, fixes, features, and obstacles. Responses are available
  in raw text, JSON, GeoJSON, XML, and (for METAR/TAF) IWXXM formats.
url: https://aviationweather.gov/data/api/
specificationVersion: '0.20'
created: '2026-05-28'
modified: '2026-05-29'
